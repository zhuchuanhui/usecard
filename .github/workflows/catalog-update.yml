name: Update card catalog

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: card-catalog-production
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/catalog/package-lock.json
      - name: Install catalog dependencies
        run: npm ci
        working-directory: services/catalog
      - name: Test and validate
        run: |
          npm run typecheck
          npm test
          npm run update
        working-directory: services/catalog
      - name: Verify published files
        run: |
          jq -e '.schemaVersion == 1 and .productCount > 0' catalog/public/manifest.json
          jq -e '.schemaVersion == 1 and (.products | length) > 0' catalog/public/latest.json
      - name: Commit verified catalog history
        run: |
          git config user.name "usecard-catalog-bot"
          git config user.email "usecard-catalog-bot@users.noreply.github.com"
          git add catalog/public
          git diff --cached --quiet || git commit -m "chore(catalog): publish verified card data"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: catalog/public
      - id: deployment
        uses: actions/deploy-pages@v4
